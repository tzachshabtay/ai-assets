name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build:
    name: Build and typecheck
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build library packages
        run: npm run build:packages

      - name: Typecheck workspaces
        run: npm run typecheck --workspaces --if-present

      - name: Build production demos
        run: |
          npm run build:web --workspace @ai-game-assets/demo-space-invaders
          npm run build:phone --workspace @ai-game-assets/demo-space-invaders
          npm run build:tablet --workspace @ai-game-assets/demo-space-invaders
