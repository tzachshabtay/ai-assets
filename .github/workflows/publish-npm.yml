name: Publish Packages

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      version:
        description: Package version to publish, for example 0.2.0 or v0.2.0
        required: true
        type: string

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Publish npm packages
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Set package versions
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "release" ]]; then
            version="${{ github.event.release.tag_name }}"
          else
            version="${{ inputs.version }}"
          fi

          version="${version#v}"

          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+([-.][0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid package version: $version" >&2
            exit 1
          fi

          echo "Publishing package version $version"
          npm version "$version" \
            --workspace @ai-game-assets/core \
            --workspace @ai-game-assets/dev \
            --workspace @ai-game-assets/phaser \
            --no-git-tag-version

      - name: Build packages
        run: |
          npm run build --workspace @ai-game-assets/core
          npm run build --workspace @ai-game-assets/dev
          npm run build --workspace @ai-game-assets/phaser

      - name: Publish core
        run: npm publish --workspace @ai-game-assets/core --access public --provenance

      - name: Publish dev
        run: npm publish --workspace @ai-game-assets/dev --access public --provenance

      - name: Publish phaser
        run: npm publish --workspace @ai-game-assets/phaser --access public --provenance
