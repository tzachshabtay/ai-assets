name: publish-npm.yml

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      version:
        description: Package version to publish, for example 0.2.0 or v0.2.0
        required: true
        type: string

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Publish npm packages
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22.14.0
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Use npm 11 for trusted publishing
        run: npm install -g npm@^11.5.1

      - name: Install dependencies
        run: npm ci

      - name: Build packages
        run: npm run build:packages

      - name: Set package versions
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "release" ]]; then
            version="${{ github.event.release.tag_name }}"
          else
            version="${{ inputs.version }}"
          fi

          version="${version#v}"

          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+([-.][0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid package version: $version" >&2
            exit 1
          fi

          echo "Publishing package version $version"
          npm version "$version" \
            --workspace @ai-game-assets/core \
            --workspace @ai-game-assets/dev \
            --workspace @ai-game-assets/phaser \
            --no-git-tag-version

      - name: Set published dependency versions
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "release" ]]; then
            version="${{ github.event.release.tag_name }}"
          else
            version="${{ inputs.version }}"
          fi

          version="${version#v}"

          npm pkg set "dependencies.@ai-game-assets/core=$version" --workspace @ai-game-assets/dev
          npm pkg set "dependencies.@ai-game-assets/core=$version" --workspace @ai-game-assets/phaser

      - name: Publish diagnostics
        shell: bash
        run: |
          set -euo pipefail

          echo "event=${GITHUB_EVENT_NAME}"
          echo "ref=${GITHUB_REF}"
          echo "workflow=${GITHUB_WORKFLOW}"
          echo "repository=${GITHUB_REPOSITORY}"
          node --version
          npm --version
          npm config get registry

          if [[ -n "${NODE_AUTH_TOKEN:-}" ]]; then
            echo "NODE_AUTH_TOKEN is set"
          else
            echo "NODE_AUTH_TOKEN is not set"
          fi

      - name: Publish core
        run: npm publish --workspace @ai-game-assets/core --access public

      - name: Publish dev
        run: npm publish --workspace @ai-game-assets/dev --access public

      - name: Publish phaser
        run: npm publish --workspace @ai-game-assets/phaser --access public
