name: Release npm packages

on:
  workflow_dispatch:
    inputs:
      version_bump:
        description: Version increment to publish from the latest npm version
        required: true
        default: patch
        type: choice
        options:
          - major
          - minor
          - patch

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    name: Release npm packages
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22.14.0
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Use npm 11 for trusted publishing
        run: npm install -g npm@^11.5.1

      - name: Install dependencies
        run: npm ci

      - name: Resolve release inputs
        id: release
        shell: bash
        run: |
          set -euo pipefail

          node - "${{ inputs.version_bump }}" <<'NODE'
          const { execFileSync } = require('node:child_process');
          const fs = require('node:fs');

          const bump = process.argv[2];
          const packages = [
            '@ai-game-assets/core',
            '@ai-game-assets/dev',
            '@ai-game-assets/phaser'
          ];

          if (!['major', 'minor', 'patch'].includes(bump)) {
            throw new Error(`Invalid version bump: ${bump}`);
          }

          const parseVersion = (version) => {
            const match = /^(\d+)\.(\d+)\.(\d+)(?:[-+].*)?$/.exec(version);

            if (!match) {
              throw new Error(`Invalid package version: ${version}`);
            }

            return {
              raw: version,
              major: Number(match[1]),
              minor: Number(match[2]),
              patch: Number(match[3])
            };
          };

          const compareVersions = (a, b) =>
            a.major - b.major || a.minor - b.minor || a.patch - b.patch;

          const publishedVersions = packages.flatMap((packageName) => {
            try {
              const version = execFileSync('npm', ['view', `${packageName}@latest`, 'version'], {
                encoding: 'utf8',
                stdio: ['ignore', 'pipe', 'ignore']
              }).trim();

              console.log(`${packageName} latest: ${version}`);
              return [parseVersion(version)];
            } catch {
              console.log(`${packageName} latest: not published`);
              return [];
            }
          });

          const localVersions = packages.map((packageName) => {
            const slug = packageName.split('/').pop();
            const packageJson = JSON.parse(fs.readFileSync(`packages/${slug}/package.json`, 'utf8'));

            return parseVersion(packageJson.version);
          });

          const candidates = publishedVersions.length > 0 ? publishedVersions : localVersions;
          const latest = candidates.sort(compareVersions).at(-1);

          let major = latest.major;
          let minor = latest.minor;
          let patch = latest.patch;

          if (bump === 'major') {
            major += 1;
            minor = 0;
            patch = 0;
          } else if (bump === 'minor') {
            minor += 1;
            patch = 0;
          } else {
            patch += 1;
          }

          const version = `${major}.${minor}.${patch}`;
          const tag = version;

          fs.appendFileSync(process.env.GITHUB_OUTPUT, [
            `bump=${bump}`,
            `latest_version=${latest.raw}`,
            `version=${version}`,
            `tag=${tag}`
          ].join('\n') + '\n');

          console.log(`Version bump: ${bump}`);
          console.log(`Latest version: ${latest.raw}`);
          console.log(`Release version: ${version}`);
          console.log(`Release tag: ${tag}`);
          NODE

      - name: Preflight release availability
        shell: bash
        run: |
          set -euo pipefail

          version="${{ steps.release.outputs.version }}"
          tag="${{ steps.release.outputs.tag }}"

          if git rev-parse -q --verify "refs/tags/$tag" >/dev/null; then
            echo "Tag already exists: $tag" >&2
            exit 1
          fi

          for package in @ai-game-assets/core @ai-game-assets/dev @ai-game-assets/phaser; do
            if npm view "$package@$version" version >/dev/null 2>&1; then
              echo "Package already exists on npm: $package@$version" >&2
              exit 1
            fi
          done

      - name: Build packages
        run: npm run build:packages

      - name: Set package versions
        shell: bash
        run: |
          set -euo pipefail

          version="${{ steps.release.outputs.version }}"

          npm version "$version" \
            --workspace @ai-game-assets/core \
            --workspace @ai-game-assets/dev \
            --workspace @ai-game-assets/phaser \
            --no-git-tag-version

      - name: Set published dependency versions
        shell: bash
        run: |
          set -euo pipefail

          version="${{ steps.release.outputs.version }}"

          npm pkg set "dependencies.@ai-game-assets/core=$version" --workspace @ai-game-assets/dev
          npm pkg set "dependencies.@ai-game-assets/core=$version" --workspace @ai-game-assets/phaser

      - name: Pack and validate packages
        shell: bash
        run: |
          set -euo pipefail

          version="${{ steps.release.outputs.version }}"
          tmpdir="$(mktemp -d)"

          npm pack --workspace @ai-game-assets/core --json > "$tmpdir/core-pack.json"
          npm pack --workspace @ai-game-assets/dev --json > "$tmpdir/dev-pack.json"
          npm pack --workspace @ai-game-assets/phaser --json > "$tmpdir/phaser-pack.json"

          node - "$version" "$tmpdir" <<'NODE'
          const fs = require('node:fs');
          const { execFileSync } = require('node:child_process');
          const version = process.argv[2];
          const tmpdir = process.argv[3];
          const packages = [
            { slug: 'core', name: '@ai-game-assets/core', needsCore: false },
            { slug: 'dev', name: '@ai-game-assets/dev', needsCore: true },
            { slug: 'phaser', name: '@ai-game-assets/phaser', needsCore: true }
          ];

          for (const pkg of packages) {
            const [pack] = JSON.parse(fs.readFileSync(`${tmpdir}/${pkg.slug}-pack.json`, 'utf8'));
            const fileNames = new Set(pack.files.map((file) => file.path));

            if (pack.name !== pkg.name) {
              throw new Error(`Expected ${pkg.name}, got ${pack.name}`);
            }

            if (pack.version !== version) {
              throw new Error(`${pkg.name} packed version ${pack.version}, expected ${version}`);
            }

            if (!fileNames.has('package.json')) {
              throw new Error(`${pkg.name} package.json is missing from tarball`);
            }

            if (!fileNames.has('dist/index.js') || !fileNames.has('dist/index.d.ts')) {
              throw new Error(`${pkg.name} dist entrypoints are missing from tarball`);
            }

            if (pkg.needsCore) {
              const packageJson = JSON.parse(execFileSync('tar', [
                '-xOf',
                pack.filename,
                'package/package.json'
              ], { encoding: 'utf8' }));
              const coreVersion = packageJson.dependencies?.['@ai-game-assets/core'];

              if (coreVersion !== version) {
                throw new Error(`${pkg.name} depends on @ai-game-assets/core ${coreVersion}, expected ${version}`);
              }
            }
          }

          console.log(`Validated package tarballs for ${version}.`);
          NODE

      - name: Publish diagnostics
        shell: bash
        run: |
          set -euo pipefail

          echo "bump=${{ steps.release.outputs.bump }}"
          echo "latest_version=${{ steps.release.outputs.latest_version }}"
          echo "version=${{ steps.release.outputs.version }}"
          echo "tag=${{ steps.release.outputs.tag }}"
          echo "event=${GITHUB_EVENT_NAME}"
          echo "ref=${GITHUB_REF}"
          echo "workflow=${GITHUB_WORKFLOW}"
          echo "repository=${GITHUB_REPOSITORY}"
          node --version
          npm --version
          npm config get registry

          if [[ -n "${NODE_AUTH_TOKEN:-}" ]]; then
            echo "NODE_AUTH_TOKEN is set"
          else
            echo "NODE_AUTH_TOKEN is not set"
          fi

      - name: Publish core
        run: npm publish --workspace @ai-game-assets/core --access public

      - name: Publish dev
        run: npm publish --workspace @ai-game-assets/dev --access public

      - name: Publish phaser
        run: npm publish --workspace @ai-game-assets/phaser --access public

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail

          tag="${{ steps.release.outputs.tag }}"
          version="${{ steps.release.outputs.version }}"
          notes_file="$(mktemp)"
          previous_tag="$(git describe --tags --abbrev=0 --match '[0-9]*' "$GITHUB_SHA^" 2>/dev/null || true)"

          {
            echo "## Changes"
            echo

            if [[ -n "$previous_tag" ]]; then
              git log --reverse --pretty=format:'- %s (%h)' "$previous_tag..$GITHUB_SHA"
              echo
              echo
              echo "**Full Changelog**: https://github.com/${GITHUB_REPOSITORY}/compare/${previous_tag}...${tag}"
            else
              git log --reverse --pretty=format:'- %s (%h)' "$GITHUB_SHA"
            fi
          } > "$notes_file"

          git tag "$tag" "$GITHUB_SHA"
          git push origin "$tag"

          gh release create "$tag" \
            --target "$GITHUB_SHA" \
            --title "Release $version" \
            --notes-file "$notes_file"
