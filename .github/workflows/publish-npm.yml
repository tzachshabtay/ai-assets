name: Publish Packages

on:
  release:
    types:
      - published
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Publish npm packages
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Build packages
        run: |
          npm run build --workspace @ai-game-assets/core
          npm run build --workspace @ai-game-assets/dev
          npm run build --workspace @ai-game-assets/phaser

      - name: Publish core
        run: npm publish --workspace @ai-game-assets/core --access public --provenance

      - name: Publish dev
        run: npm publish --workspace @ai-game-assets/dev --access public --provenance

      - name: Publish phaser
        run: npm publish --workspace @ai-game-assets/phaser --access public --provenance
