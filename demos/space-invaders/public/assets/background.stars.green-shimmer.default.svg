<svg xmlns="http://www.w3.org/2000/svg" width="128" height="32" viewBox="0 0 128 32">
  <rect width="128" height="32" fill="none"/>
  <defs>
    <filter id="glow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="2.4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <g id="diamond" filter="url(#glow)">
      <path d="M16 3 21 16 16 29 11 16Z"/>
      <path d="M3 16 16 11 29 16 16 21Z"/>
      <circle cx="16" cy="16" r="2"/>
    </g>
  </defs>
  <g fill="#a7f3d0">
    <use href="#diamond" x="0" opacity=".75" transform="rotate(45 16 16)"/>
    <use href="#diamond" x="32" opacity=".35" transform="rotate(45 48 16)"/>
    <use href="#diamond" x="64" opacity=".65" transform="rotate(45 80 16)"/>
    <use href="#diamond" x="96" opacity="1" transform="rotate(45 112 16)"/>
  </g>
</svg>
