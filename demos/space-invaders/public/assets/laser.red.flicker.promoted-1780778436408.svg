<svg xmlns="http://www.w3.org/2000/svg" width="10" height="32" viewBox="0 0 10 32">
  <defs>
    <radialGradient id="rgHaloRed" cx="50%" cy="50%" r="65%">
      <stop offset="0" stop-color="#ff4a4a" stop-opacity="0.95"/>
      <stop offset="0.5" stop-color="#ff2e2e" stop-opacity="0.65"/>
      <stop offset="1" stop-color="#ff0000" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="lgCoreRed" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.2" stop-color="#ffd6d6"/>
      <stop offset="0.5" stop-color="#ffffff"/>
      <stop offset="0.8" stop-color="#ffd6d6"/>
      <stop offset="1" stop-color="#ffffff"/>
    </linearGradient>
    <radialGradient id="rgFlash" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="0.35" stop-color="#ffeaea" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#ff2a2a" stop-opacity="0"/>
    </radialGradient>
    <filter id="glowWeak" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="0.5"/>
    </filter>
    <filter id="glowMed" x="-70%" y="-70%" width="240%" height="240%">
      <feGaussianBlur stdDeviation="0.8"/>
    </filter>
    <filter id="glowStrong" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="1.2"/>
    </filter>
  </defs>

  <!-- Frame 1 (x0-4, y0-15): medium glow, long beam -->
  <g id="frame1" transform="translate(0,0)">
    <!-- outer red halo -->
    <rect x="0.9" y="2" width="3.2" height="12" rx="1.6" fill="url(#rgHaloRed)" opacity="0.9" filter="url(#glowMed)"/>
    <!-- crisp halo skin to keep cartoon edge -->
    <rect x="0.9" y="2" width="3.2" height="12" rx="1.6" fill="url(#rgHaloRed)" opacity="0.35"/>
    <!-- hot core -->
    <rect x="1.9" y="3" width="1.2" height="10" rx="0.6" fill="url(#lgCoreRed)"/>
    <!-- central specular streak -->
    <rect x="2.25" y="3.2" width="0.3" height="9.6" rx="0.15" fill="#ffffff" opacity="0.9"/>
    <!-- pulse flare -->
    <circle cx="2.5" cy="8" r="1.2" fill="url(#rgFlash)" opacity="0.85"/>
  </g>

  <!-- Frame 2 (x5-9, y0-15): thinner, dimmer, slightly shorter -->
  <g id="frame2" transform="translate(5,0)">
    <rect x="1.3" y="3" width="2.4" height="10" rx="1.2" fill="url(#rgHaloRed)" opacity="0.75" filter="url(#glowWeak)"/>
    <rect x="1.3" y="3" width="2.4" height="10" rx="1.2" fill="url(#rgHaloRed)" opacity="0.28"/>
    <rect x="2.1" y="4" width="0.8" height="8" rx="0.4" fill="url(#lgCoreRed)"/>
    <rect x="2.35" y="4.1" width="0.25" height="7.8" rx="0.12" fill="#ffffff" opacity="0.85"/>
    <circle cx="2.5" cy="8" r="0.9" fill="url(#rgFlash)" opacity="0.7"/>
  </g>

  <!-- Frame 3 (x0-4, y16-31): brightest, thickest, longest -->
  <g id="frame3" transform="translate(0,16)">
    <rect x="0.7" y="1" width="3.6" height="14" rx="1.8" fill="url(#rgHaloRed)" opacity="0.95" filter="url(#glowStrong)"/>
    <rect x="0.7" y="1" width="3.6" height="14" rx="1.8" fill="url(#rgHaloRed)" opacity="0.4"/>
    <rect x="1.7" y="2" width="1.6" height="12" rx="0.8" fill="url(#lgCoreRed)"/>
    <rect x="2.35" y="2.1" width="0.35" height="11.8" rx="0.17" fill="#ffffff" opacity="0.95"/>
    <circle cx="2.5" cy="8" r="1.4" fill="url(#rgFlash)" opacity="0.95"/>
  </g>

  <!-- Frame 4 (x5-9, y16-31): compact afterglow -->
  <g id="frame4" transform="translate(5,16)">
    <rect x="1.1" y="4" width="2.8" height="8" rx="1.4" fill="url(#rgHaloRed)" opacity="0.82" filter="url(#glowMed)"/>
    <rect x="1.1" y="4" width="2.8" height="8" rx="1.4" fill="url(#rgHaloRed)" opacity="0.32"/>
    <rect x="2.0" y="4.5" width="1.0" height="7" rx="0.5" fill="url(#lgCoreRed)"/>
    <rect x="2.3" y="4.6" width="0.3" height="6.8" rx="0.15" fill="#ffffff" opacity="0.88"/>
    <circle cx="2.5" cy="8" r="0.8" fill="url(#rgFlash)" opacity="0.75"/>
  </g>
</svg>