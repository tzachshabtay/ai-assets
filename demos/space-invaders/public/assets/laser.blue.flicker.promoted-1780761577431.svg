<svg xmlns="http://www.w3.org/2000/svg" width="8" height="36" viewBox="0 0 8 36">
  <!-- Frame 1: soft, thin blue beam -->
  <g id="frame1_softStart" transform="translate(0,0)">
    <!-- outer glow -->
    <path d="M2 1 L2 17" fill="none" stroke="#34b6ff" stroke-width="2.6" stroke-linecap="round" opacity="0.38"/>
    <!-- mid glow -->
    <path d="M2 1 L2 17" fill="none" stroke="#7fe8ff" stroke-width="1.8" stroke-linecap="round" opacity="0.72"/>
    <!-- hot core -->
    <path d="M2 1 L2 17" fill="none" stroke="#e9fbff" stroke-width="0.8" stroke-linecap="round"/>
    <!-- gentle pulse at center -->
    <ellipse cx="2" cy="9" rx="0.7" ry="1.2" fill="#bff3ff" opacity="0.45"/>
  </g>

  <!-- Frame 2: brighter pulse, slight flare -->
  <g id="frame2_pulseRise" transform="translate(4,0)">
    <!-- outer glow expands -->
    <path d="M2 1 L2 17" fill="none" stroke="#2aaeff" stroke-width="3.2" stroke-linecap="round" opacity="0.5"/>
    <!-- mid glow thicker -->
    <path d="M2 1 L2 17" fill="none" stroke="#76eaff" stroke-width="2.2" stroke-linecap="round" opacity="0.9"/>
    <!-- hot core brightened -->
    <path d="M2 1 L2 17" fill="none" stroke="#ffffff" stroke-width="1.1" stroke-linecap="round"/>
    <!-- central flare -->
    <path d="M0.6 9 H3.4" fill="none" stroke="#c7f6ff" stroke-width="0.7" stroke-linecap="round" opacity="0.9"/>
    <circle cx="2" cy="9" r="0.7" fill="#d9fbff" opacity="0.75"/>
  </g>

  <!-- Frame 3: ebb, segmented highlights -->
  <g id="frame3_pulseFall" transform="translate(0,18)">
    <!-- outer glow contracts -->
    <path d="M2 1 L2 17" fill="none" stroke="#33b8ff" stroke-width="2.8" stroke-linecap="round" opacity="0.42"/>
    <!-- mid glow -->
    <path d="M2 1 L2 17" fill="none" stroke="#88ecff" stroke-width="1.9" stroke-linecap="round" opacity="0.78"/>
    <!-- core -->
    <path d="M2 1 L2 17" fill="none" stroke="#f2feff" stroke-width="0.9" stroke-linecap="round"/>
    <!-- twin nodes suggesting slow glow travel -->
    <ellipse cx="2" cy="6" rx="0.6" ry="0.9" fill="#bbf2ff" opacity="0.55"/>
    <ellipse cx="2" cy="12" rx="0.6" ry="0.9" fill="#bbf2ff" opacity="0.55"/>
  </g>

  <!-- Frame 4: strongest, wide glow and starburst -->
  <g id="frame4_peak" transform="translate(4,18)">
    <!-- outer glow at max -->
    <path d="M2 1 L2 17" fill="none" stroke="#12a5ff" stroke-width="3.6" stroke-linecap="round" opacity="0.55"/>
    <!-- intense mid glow -->
    <path d="M2 1 L2 17" fill="none" stroke="#5fe6ff" stroke-width="2.8" stroke-linecap="round" opacity="0.95"/>
    <!-- overcharged core -->
    <path d="M2 1 L2 17" fill="none" stroke="#ffffff" stroke-width="1.4" stroke-linecap="round"/>
    <!-- starburst at center -->
    <path d="M0.5 9 H3.5" fill="none" stroke="#e2ffff" stroke-width="0.9" stroke-linecap="round" opacity="0.95"/>
    <path d="M0.9 7.6 L3.1 10.4" fill="none" stroke="#c8faff" stroke-width="0.6" stroke-linecap="round" opacity="0.85"/>
    <path d="M3.1 7.6 L0.9 10.4" fill="none" stroke="#c8faff" stroke-width="0.6" stroke-linecap="round" opacity="0.85"/>
    <!-- subtle end glints -->
    <circle cx="2" cy="2" r="0.5" fill="#dffbff" opacity="0.7"/>
    <circle cx="2" cy="16" r="0.5" fill="#dffbff" opacity="0.7"/>
  </g>
</svg>