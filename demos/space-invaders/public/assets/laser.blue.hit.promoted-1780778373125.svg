<svg xmlns="http://www.w3.org/2000/svg" width="36" height="36" viewBox="0 0 36 36">
  <defs>
    <radialGradient id="gradBlueCore" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.45" stop-color="#c8f6ff"/>
      <stop offset="1" stop-color="#2fb4ff"/>
    </radialGradient>
    <radialGradient id="gradBlueGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#7be8ff" stop-opacity="0.85"/>
      <stop offset="0.6" stop-color="#40c6ff" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#0aa0ff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- FRAME 1 (x0-17,y0-17) -->
  <g id="frame1" transform="translate(0,0)">
    <!-- soft glow -->
    <circle cx="9" cy="3.8" r="3.2" fill="url(#gradBlueGlow)"/>
    <!-- core flash -->
    <circle cx="9" cy="3.8" r="1.5" fill="url(#gradBlueCore)" stroke="#0b2a66" stroke-width="0.4"/>
    <!-- tight ring -->
    <circle cx="9" cy="3.8" r="2.4" fill="none" stroke="#63e1ff" stroke-width="0.9"/>
    <circle cx="9" cy="3.8" r="2.4" fill="none" stroke="#0b2a66" stroke-width="0.5"/>
    <!-- tiny electric forks -->
    <path d="M8.5,0.9 L9.3,1.9 8.1,2.3 9.4,3.1" fill="none" stroke="#bdf2ff" stroke-width="0.7" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M9.6,0.7 L10.2,1.8 9.0,2.1 10.3,3.0" fill="none" stroke="#0b2a66" stroke-width="0.45" stroke-linecap="round" stroke-linejoin="round" opacity="0.85"/>
    <!-- small stylized star tips -->
    <path d="M9,1.0 L9.9,3.0 L12.1,3.3 L10.1,4.3 L10.6,6.2 L9.0,5.0 L7.4,6.2 L7.9,4.3 L5.9,3.3 L8.1,3.0 Z"
          fill="#46c9ff" stroke="#0b2a66" stroke-width="0.5" stroke-linejoin="round" opacity="0.9"/>
  </g>

  <!-- FRAME 2 (x18-35,y0-17) -->
  <g id="frame2" transform="translate(18,0)">
    <!-- stronger glow -->
    <circle cx="9" cy="4.3" r="4.4" fill="url(#gradBlueGlow)" opacity="0.95"/>
    <!-- burst star -->
    <path d="M13.0,4.3 L10.30,5.62 L9.00,8.30 L7.70,5.62 L5.00,4.30 L7.70,3.00 L9.00,0.30 L10.30,3.00 Z"
          fill="#5ed6ff" stroke="#0b2a66" stroke-width="0.7" stroke-linejoin="round"/>
    <!-- bright core -->
    <circle cx="9" cy="4.3" r="2.1" fill="url(#gradBlueCore)" stroke="#0b2a66" stroke-width="0.5"/>
    <!-- ring highlight -->
    <circle cx="9" cy="4.3" r="3.6" fill="none" stroke="#9beeff" stroke-width="1.0"/>
    <circle cx="9" cy="4.3" r="3.6" fill="none" stroke="#0b2a66" stroke-width="0.6"/>
    <!-- sparkling motes -->
    <circle cx="3.7" cy="3.2" r="0.7" fill="#ffffff" stroke="#0b2a66" stroke-width="0.4"/>
    <circle cx="14.1" cy="2.8" r="0.6" fill="#c8f6ff" stroke="#0b2a66" stroke-width="0.35"/>
    <circle cx="9.0" cy="0.6" r="0.5" fill="#e9fdff" stroke="#0b2a66" stroke-width="0.35"/>
  </g>

  <!-- FRAME 3 (x0-17,y18-35) -->
  <g id="frame3" transform="translate(0,18)">
    <!-- expanding glow -->
    <circle cx="9" cy="5.0" r="5.0" fill="url(#gradBlueGlow)" opacity="0.85"/>
    <!-- airy dashed ring -->
    <circle cx="9" cy="5.0" r="5.0" fill="none" stroke="#9eeaff" stroke-width="1.1" stroke-dasharray="2.4 1.4" stroke-linecap="round"/>
    <circle cx="9" cy="5.0" r="5.0" fill="none" stroke="#0b2a66" stroke-width="0.55" stroke-dasharray="2.4 1.4" stroke-linecap="round" opacity="0.9"/>
    <!-- fading core -->
    <circle cx="9" cy="5.0" r="1.2" fill="url(#gradBlueCore)" stroke="#0b2a66" stroke-width="0.4" opacity="0.9"/>
    <!-- outward shards -->
    <path d="M9,0.4 L10.2,1.8 L9,2.4 L7.8,1.8 Z" fill="#54d1ff" stroke="#0b2a66" stroke-width="0.5" stroke-linejoin="round"/>
    <path d="M13.6,3.8 L12.7,5.0 L11.8,4.6 L12.2,3.4 Z" fill="#54d1ff" stroke="#0b2a66" stroke-width="0.5" stroke-linejoin="round"/>
    <path d="M4.4,3.8 L5.3,5.0 L6.2,4.6 L5.8,3.4 Z" fill="#54d1ff" stroke="#0b2a66" stroke-width="0.5" stroke-linejoin="round"/>
    <path d="M9.0,7.3 L10.6,8.3 L9.0,9.2 L7.4,8.3 Z" fill="#3fc0ff" stroke="#0b2a66" stroke-width="0.5" stroke-linejoin="round" opacity="0.85"/>
  </g>

  <!-- FRAME 4 (x18-35,y18-35) -->
  <g id="frame4" transform="translate(18,18)">
    <!-- wide fading glow -->
    <circle cx="9" cy="5.2" r="5.2" fill="url(#gradBlueGlow)" opacity="0.55"/>
    <!-- thin broken rim -->
    <circle cx="9" cy="5.2" r="5.2" fill="none" stroke="#aeeeff" stroke-width="0.9" stroke-dasharray="1.4 2.2" stroke-linecap="round" opacity="0.9"/>
    <circle cx="9" cy="5.2" r="5.2" fill="none" stroke="#0b2a66" stroke-width="0.5" stroke-dasharray="1.4 2.2" stroke-linecap="round" opacity="0.8"/>
    <!-- faint sparks drifting -->
    <circle cx="9" cy="1.0" r="0.5" fill="#ffffff" opacity="0.8"/>
    <circle cx="12.8" cy="2.2" r="0.5" fill="#c8f6ff" opacity="0.75"/>
    <circle cx="5.2" cy="2.4" r="0.4" fill="#c8f6ff" opacity="0.7"/>
    <path d="M9.0,4.9 L10.0,6.3 L8.8,6.6 Z" fill="#5dd4ff" stroke="#0b2a66" stroke-width="0.45" opacity="0.8"/>
    <!-- dying center -->
    <circle cx="9" cy="5.2" r="0.7" fill="#e9fdff" stroke="#0b2a66" stroke-width="0.4" opacity="0.75"/>
  </g>
</svg>