<svg xmlns="http://www.w3.org/2000/svg" width="128" height="160" viewBox="0 0 128 160">
  <rect width="128" height="160" fill="none"/>
  <defs>
    <filter id="glow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="2.4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <g id="spark" filter="url(#glow)">
      <path d="M16 5 19 13 27 16 19 19 16 27 13 19 5 16 13 13Z"/>
      <circle cx="16" cy="16" r="2.8"/>
    </g>
    <g id="diamond" filter="url(#glow)">
      <path d="M16 3 21 16 16 29 11 16Z"/>
      <path d="M3 16 16 11 29 16 16 21Z"/>
      <circle cx="16" cy="16" r="2"/>
    </g>
    <g id="cross" filter="url(#glow)">
      <path d="M15 4h2l1.5 10.5L29 15v2l-10.5 1.5L17 29h-2l-1.5-10.5L3 17v-2l10.5-1.5Z"/>
      <circle cx="16" cy="16" r="3.2"/>
    </g>
  </defs>
  <g fill="#f8fafc">
    <use href="#spark" x="0" y="0" opacity=".45"/>
    <use href="#spark" x="32" y="0" opacity=".7"/>
    <use href="#spark" x="64" y="0" opacity="1"/>
    <use href="#spark" x="96" y="0" opacity=".7"/>
  </g>
  <g fill="#6ed3ff">
    <use href="#diamond" x="0" y="32" opacity=".35"/>
    <use href="#diamond" x="32" y="32" opacity=".65"/>
    <use href="#diamond" x="64" y="32" opacity=".9"/>
    <use href="#diamond" x="96" y="32" opacity=".55"/>
  </g>
  <g fill="#fde68a">
    <use href="#cross" x="0" y="64" opacity=".3"/>
    <use href="#cross" x="32" y="64" opacity=".6"/>
    <use href="#cross" x="64" y="64" opacity="1"/>
    <use href="#cross" x="96" y="64" opacity=".45"/>
  </g>
  <g fill="#c4b5fd">
    <use href="#spark" x="0" y="96" opacity=".5" transform="rotate(18 16 112)"/>
    <use href="#spark" x="32" y="96" opacity=".95" transform="rotate(18 48 112)"/>
    <use href="#spark" x="64" y="96" opacity=".55" transform="rotate(18 80 112)"/>
    <use href="#spark" x="96" y="96" opacity=".8" transform="rotate(18 112 112)"/>
  </g>
  <g fill="#a7f3d0">
    <use href="#diamond" x="0" y="128" opacity=".75" transform="rotate(45 16 144)"/>
    <use href="#diamond" x="32" y="128" opacity=".35" transform="rotate(45 48 144)"/>
    <use href="#diamond" x="64" y="128" opacity=".65" transform="rotate(45 80 144)"/>
    <use href="#diamond" x="96" y="128" opacity="1" transform="rotate(45 112 144)"/>
  </g>
</svg>
